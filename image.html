<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Utility Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent-color: #8b5cf6;
      --bg-dark: #07080c;
      --card-bg: rgba(22, 26, 44, 0.45);
      --border-color: rgba(255, 255, 255, 0.08);
    }
    body {
      margin: 0;
      padding: 40px;
      width: 100vw;
      height: 100vh;
      box-sizing: border-box;
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(135deg, #0e0926 0%, var(--bg-dark) 100%);
      color: #f3f4f6;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      overflow: auto;
    }
    .header {
      width: 100%;
      max-width: 800px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }
    .logo-section {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-icon {
      font-size: 24px;
      filter: drop-shadow(0 0 8px var(--accent-color));
    }
    .logo-text {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, #fff, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .back-link {
      font-size: 13px;
      color: #9ca3af;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }
    .back-link:hover {
      color: var(--accent-color);
    }

    .main-layout {
      width: 100%;
      max-width: 800px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
    }

    .dropzone-container {
      background: var(--card-bg);
      border: 2px dashed rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      padding: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      cursor: pointer;
      min-height: 280px;
      box-sizing: border-box;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      transition: all 0.2s;
      position: relative;
    }
    .dropzone-container:hover, .dropzone-container.active {
      border-color: var(--accent-color);
      background: rgba(139, 92, 246, 0.05);
    }
    .drop-input {
      display: none;
    }

    .preview-container {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 20px;
      box-sizing: border-box;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      display: flex;
      flex-direction: column;
      gap: 16px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .preview-box {
      width: 100%;
      height: 200px;
      border-radius: 8px;
      background: rgba(255,255,255,0.01);
      border: 1px dashed rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .preview-image {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #9ca3af;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      padding-bottom: 8px;
    }
    .info-val {
      color: white;
      font-weight: 600;
    }

    .controls-panel {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 10px;
    }
    .control-label {
      font-size: 11px;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .control-row {
      display: flex;
      gap: 10px;
    }
    .input-num {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: white;
      padding: 10px;
      font-size: 13px;
      outline: none;
      width: 100px;
      box-sizing: border-box;
    }
    .btn {
      background: var(--accent-color);
      border: none;
      border-radius: 8px;
      color: white;
      padding: 10px 18px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      flex-grow: 1;
      text-align: center;
    }
    .btn:hover {
      opacity: 0.9;
    }
    .btn-secondary {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #e2e8f0;
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.1);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-section">
      <span class="logo-icon">🖼️</span>
      <span class="logo-text">Clipboard Image Tools</span>
    </div>
    <a href="newtab.html" class="back-link">‹ New Tab Launcher</a>
  </div>

  <div class="main-layout">
    <div class="dropzone-container" id="dropzone">
      <div style="font-size: 32px;">📥</div>
      <div style="font-weight: 700; font-size: 15px; margin-top: 10px;">Paste Image (Ctrl+V) or Drop file</div>
      <div style="font-size: 12px; color: #9ca3af; margin-top: 4px;">Supports PNG, JPG, WebP, GIF</div>
      <input type="file" id="file-input" class="drop-input" accept="image/*">
    </div>

    <div class="preview-container" id="preview-panel" style="display: none;">
      <div class="preview-box">
        <img id="preview-img" class="preview-image" src="" alt="Preview">
      </div>
      <div>
        <div class="info-row">
          <span>Filename</span>
          <span class="info-val" id="info-name">clipboard.png</span>
        </div>
        <div class="info-row">
          <span>Dimensions</span>
          <span class="info-val" id="info-dims">0 x 0 px</span>
        </div>
        <div class="info-row">
          <span>File Size</span>
          <span class="info-val" id="info-size">0 KB</span>
        </div>
      </div>

      <div class="controls-panel">
        <div class="control-label">Scale Width</div>
        <div class="control-row">
          <input type="number" class="input-num" id="width-input" placeholder="800">
          <button class="btn btn-secondary" id="btn-scale">Scale Image</button>
        </div>

        <div class="control-label">Convert & Export</div>
        <div class="control-row" style="flex-wrap: wrap;">
          <button class="btn" id="btn-webp" style="background:#0284c7;">WebP</button>
          <button class="btn" id="btn-png" style="background:#10b981;">PNG</button>
          <button class="btn" id="btn-jpg" style="background:#f59e0b;">JPG</button>
        </div>
      </div>
    </div>
  </div>

  <script src="image.js"></script>
</body>
</html>

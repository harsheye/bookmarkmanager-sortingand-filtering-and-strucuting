<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>New Tab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent-color: #8b5cf6;
      --bg-gradient: linear-gradient(180deg, rgba(10, 7, 24, 0.45) 0%, rgba(5, 5, 10, 0.85) 100%);
    }
    body {
      margin: 0;
      padding: 30px;
      width: 100vw;
      height: 100vh;
      font-family: 'Outfit', -apple-system, sans-serif;
      color: #f3f4f6;
      background-color: #06070b;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 45px;
      overflow: hidden;
      box-sizing: border-box;
    }
    
    /* Background overlay */
    .bg-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: var(--bg-gradient);
      z-index: -1;
    }

    /* Top Clock section */
    .top-section {
      text-align: center;
      z-index: 10;
      margin-bottom: 20px;
    }
    .clock {
      font-size: 52px;
      font-weight: 700;
      letter-spacing: -1.5px;
      margin-bottom: 4px;
      text-shadow: 0 4px 16px rgba(0,0,0,0.6);
      background: linear-gradient(135deg, #ffffff 30%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .date {
      font-size: 13px;
      color: #9ca3af;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      opacity: 0.8;
    }

    /* Top Visited Sites */
    .visited-sites {
      display: flex;
      gap: 16px;
      z-index: 10;
      margin-top: 20px;
    }
    .site-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 10px 18px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      color: #cbd5e1;
      text-decoration: none;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
    }
    .site-card:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.18);
      color: #ffffff;
      box-shadow: 0 8px 30px rgba(139, 92, 246, 0.2);
    }
    .site-icon {
      width: 18px;
      height: 18px;
      border-radius: 4px;
    }
    .site-title {
      font-size: 13px;
      font-weight: 600;
      max-width: 100px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Center workspace spacer */
    .center-section {
      flex-grow: 1;
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      justify-content: center;
      gap: 30px;
      width: 100%;
      max-width: 1200px;
      position: relative;
      padding-top: 80px;
      box-sizing: border-box;
    }

    #palette-placeholder {
      width: 600px;
      flex-shrink: 0;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .glass-panel {
      background: rgba(255, 255, 255, 0.015);
      border: 1px solid rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.45);
      width: 270px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      box-sizing: border-box;
    }
    .panel-header {
      font-size: 11px;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding-bottom: 8px;
      margin-bottom: 4px;
    }
    
    /* Quick Tools style */
    .tool-btn {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      padding: 8px 12px;
      color: #e2e8f0;
      font-weight: 500;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
    }
    .tool-btn:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: var(--accent-color);
      transform: translateX(2px);
    }

    /* Notes panel list style */
    .notes-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 120px;
      overflow-y: auto;
    }
    .note-item {
      font-size: 13px;
      color: #cbd5e1;
      cursor: pointer;
      padding: 6px 8px;
      border-radius: 6px;
      background: rgba(255,255,255,0.01);
      border: 1px solid transparent;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: all 0.15s;
    }
    .note-item:hover {
      background: rgba(255,255,255,0.04);
      border-color: rgba(255,255,255,0.08);
      color: #ffffff;
    }
    .btn-new-note {
      background: var(--accent-color);
      border: none;
      border-radius: 8px;
      color: white;
      padding: 8px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      transition: opacity 0.2s;
    }
    .btn-new-note:hover {
      opacity: 0.9;
    }

    /* Background Settings Toggle */
    .bg-settings-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      cursor: pointer;
      width: 32px;
      height: 32px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #9ca3af;
      transition: all 0.2s;
      z-index: 20;
    }
    .bg-settings-btn:hover {
      color: #ffffff;
      background: rgba(255, 255, 255, 0.08);
      transform: rotate(30deg);
    }
    
    .bg-modal {
      position: fixed;
      top: 60px;
      right: 20px;
      background: rgba(15, 18, 28, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 16px;
      width: 280px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      display: none;
      flex-direction: column;
      gap: 12px;
      z-index: 100;
    }
    .bg-modal.active {
      display: flex;
    }
    .bg-input {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      color: white;
      padding: 8px;
      font-size: 12px;
      outline: none;
    }
  </style>
</head>
<body>
  <div class="bg-overlay"></div>
  
  <div class="bg-settings-btn" id="bg-settings-trigger">⚙️</div>
  <div class="bg-modal" id="bg-modal">
    <div style="font-size:12px; font-weight:700; color:#9ca3af; text-transform:uppercase; letter-spacing:0.5px;">Custom Background</div>
    <input type="text" class="bg-input" id="bg-url-input" placeholder="Paste image URL here...">
    <div style="text-align:center; color:#4b5563; font-size:10px;">- OR -</div>
    <button class="btn-new-note" id="bg-upload-btn" style="background:#4f46e5;">Upload Local File</button>
    <input type="file" id="bg-file-input" style="display:none;" accept="image/*">
    <button class="btn-new-note" id="bg-save-btn">Apply Background</button>
    <button class="btn-new-note" id="bg-reset-btn" style="background:#e11d48;">Reset to Default</button>
  </div>

  <div class="top-section">
    <div class="clock" id="clock">-:-</div>
    <div class="date" id="date">------</div>
    <div class="visited-sites" id="visited-sites"></div>
  </div>

  <div class="center-section">
    <!-- Left panel: Quick Tools -->
    <div class="glass-panel">
      <div class="panel-header">🧰 Quick Tools</div>
      <div class="tool-btn" id="tool-image">
        <span>🖼️</span> Clipboard Image Tools
      </div>
      <div class="tool-btn" id="tool-pdf">
        <span>📄</span> PDF Utilities
      </div>
    </div>

    <!-- Center: Command Palette Placeholder -->
    <div id="palette-placeholder"></div>

    <!-- Right panel: Recent Notes -->
    <div class="glass-panel">
      <div class="panel-header">📝 Recent Notes</div>
      <div class="notes-list" id="notes-list"></div>
      <button class="btn-new-note" id="btn-create-note">➕ New Note</button>
    </div>
  </div>

  <!-- Load extension scripts -->
  <script src="rules.js"></script>
  <script src="db.js"></script>
  <script src="content.js"></script>
  <script src="newtab.js"></script>
</body>
</html>
